<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🩺 Disease Prediction System</h1>
    <p class="subtitle">Enter your symptoms to predict possible disease</p>

    <form method="POST" class="form-box">

        <h3>Enter Symptoms (0 = No, 1 = Yes)</h3>

        <div class="inputs">
            <input type="number" name="symptoms" placeholder="Symptom 1" min="0" max="1">
            <input type="number" name="symptoms" placeholder="Symptom 2" min="0" max="1">
            <input type="number" name="symptoms" placeholder="Symptom 3" min="0" max="1">
        </div>

        <button type="submit">Predict</button>

    </form>

    {% if disease %}
    <div class="result-box">

        <h2>🧾 Prediction Result</h2>

        <h3>Disease: <span>{{ disease }}</span></h3>

        <div class="card">
            <h4>Description</h4>
            <p>{{ description }}</p>
        </div>

        <div class="card">
            <h4>Precautions</h4>
            <ul>
                {% for p in precautions %}
                <li>{{ p }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
